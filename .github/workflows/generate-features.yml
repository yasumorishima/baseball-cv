name: Generate Features CSV

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Analysis mode"
        required: true
        default: "hitting"
        type: choice
        options:
          - pitching
          - hitting
          - both

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ezc3d numpy pandas scipy matplotlib scikit-learn pillow

      - name: Cache downloaded C3D files
        uses: actions/cache@v4
        with:
          path: data/raw/*.c3d
          key: c3d-${{ inputs.mode }}-v1

      - name: Generate features CSV and plots
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.mode }}" = "pitching" ] || [ "${{ inputs.mode }}" = "both" ]; then
            python statcast_correlation.py --mode pitching --download 60
            python body_efficiency_analysis.py
            FIRST_PITCH=$(ls data/raw/*_FF_*.c3d 2>/dev/null | head -1)
            if [ -n "$FIRST_PITCH" ]; then
              python skeleton_analysis.py --input "$FIRST_PITCH" --mode pitching
            fi
          fi
          if [ "${{ inputs.mode }}" = "hitting" ] || [ "${{ inputs.mode }}" = "both" ]; then
            python statcast_correlation.py --mode hitting --download 40
            python body_efficiency_hitting.py
            FIRST_HIT=$(ls data/raw/*_R_*.c3d 2>/dev/null | head -1)
            if [ -n "$FIRST_HIT" ]; then
              python skeleton_analysis.py --input "$FIRST_HIT" --mode hitting
            fi
          fi

      - name: Commit and push outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/*.csv data/output/*.png
          git diff --staged --quiet || git commit -m "ci: regenerate ${{ inputs.mode }} features and efficiency plots [skip ci]"
          git stash --include-untracked || true
          git pull --rebase
          git stash pop || true
          git push
